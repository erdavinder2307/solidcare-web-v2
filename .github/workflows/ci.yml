name: Web CI/CD

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]
  workflow_dispatch:

concurrency:
  group: web-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run lint

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run type-check

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm test

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 45
    continue-on-error: true

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: solidcare
          POSTGRES_PASSWORD: solidcare
          POSTGRES_DB: solidcare_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Checkout API (sibling repo)
        uses: actions/checkout@v4
        with:
          repository: erdavinder2307/solidcare-api-v2
          path: solidcare-api-v2
          ref: ${{ github.event_name == 'pull_request' && github.base_ref || github.ref_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install API dependencies
        working-directory: solidcare-api-v2
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt bcrypt==4.0.1

      - name: Run migrations and seed
        working-directory: solidcare-api-v2
        env:
          DATABASE_URL: postgresql+asyncpg://solidcare:solidcare@localhost:5432/solidcare_dev
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET_KEY: ci-e2e-secret-key
          ENV: test
        run: |
          alembic upgrade head
          PGPASSWORD=solidcare psql -h localhost -U solidcare -d solidcare_dev -f scripts/seed_dev_admin.sql
          PGPASSWORD=solidcare psql -h localhost -U solidcare -d solidcare_dev -f scripts/seed_e2e_users.sql

      - name: Start API server
        working-directory: solidcare-api-v2
        env:
          DATABASE_URL: postgresql+asyncpg://solidcare:solidcare@localhost:5432/solidcare_dev
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET_KEY: ci-e2e-secret-key
          ENV: test
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          sleep 5
          curl -f http://localhost:8000/health

      - name: Install web dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Build and preview web app
        env:
          VITE_API_BASE_URL: http://localhost:8000/api/v1
        run: |
          npx vite build
          npm run preview -- --port 5173 --host &
          sleep 3

      - name: Run E2E tests
        env:
          CI: true
          PLAYWRIGHT_BASE_URL: http://localhost:5173
          PLAYWRIGHT_API_URL: http://localhost:8000/api/v1
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            tests/reports/
            test-results/
          retention-days: 14

  build:
    name: Production Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - name: Build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_ENVIRONMENT: development
          VITE_APP_NAME: Solidcare
          VITE_DEFAULT_CLINIC_ID: 00000000-0000-0000-0000-000000000010
        run: |
          export VITE_API_BASE_URL="${VITE_API_BASE_URL:-https://solidcare-api-dev.azurewebsites.net/api/v1}"
          npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: dist
          retention-days: 7

  deploy-dev:
    name: Deploy to Azure Static Web Apps (Dev)
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main')
    environment: development
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: web-build
          path: dist

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_TOKEN }}
          action: upload
          app_location: dist
          skip_app_build: true

      - name: Smoke check homepage
        run: |
          for url in "https://solidcare.org/" "https://red-mushroom-0bb9f0b00.7.azurestaticapps.net/"; do
            code=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 30 "$url" || echo "000")
            echo "$url -> HTTP $code"
            if [ "$code" = "200" ]; then
              exit 0
            fi
          done
          echo "Homepage smoke check failed"
          exit 1
