name: E2E Tests

on:
  push:
    branches: [main, develop, "release/**"]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 45

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: solidcare
          POSTGRES_PASSWORD: solidcare
          POSTGRES_DB: solidcare_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Checkout API (sibling repo)
        uses: actions/checkout@v4
        with:
          repository: erdavinder2307/solidcare-api-v2
          path: solidcare-api-v2
          ref: ${{ github.event_name == 'pull_request' && github.base_ref || github.ref_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install API dependencies
        working-directory: solidcare-api-v2
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt bcrypt==4.0.1

      - name: Run migrations and seed
        working-directory: solidcare-api-v2
        env:
          DATABASE_URL: postgresql+asyncpg://solidcare:solidcare@localhost:5432/solidcare_dev
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET_KEY: ci-e2e-secret-key
          ENV: test
        run: |
          alembic upgrade head
          PGPASSWORD=solidcare psql -h localhost -U solidcare -d solidcare_dev -f scripts/seed_dev_admin.sql
          PGPASSWORD=solidcare psql -h localhost -U solidcare -d solidcare_dev -f scripts/seed_e2e_users.sql

      - name: Start API server
        working-directory: solidcare-api-v2
        env:
          DATABASE_URL: postgresql+asyncpg://solidcare:solidcare@localhost:5432/solidcare_dev
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET_KEY: ci-e2e-secret-key
          ENV: test
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          sleep 5
          curl -f http://localhost:8000/health

      - name: Install web dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Build and preview web app
        env:
          VITE_API_BASE_URL: http://localhost:8000/api/v1
        run: |
          npx vite build
          npm run preview -- --port 5173 --host &
          sleep 3

      - name: Run E2E tests
        env:
          CI: true
          PLAYWRIGHT_BASE_URL: http://localhost:5173
          PLAYWRIGHT_API_URL: http://localhost:8000/api/v1
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            tests/reports/
            test-results/
          retention-days: 14
